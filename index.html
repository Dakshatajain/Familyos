  return html`<span style=${{background:bg[color]||C.sageLt,color:fg[color]||C.sage,borderRadius:6,padding:small?'2px 7px':'3px 10px',fontSize:small?11:12,fontWeight:600,whiteSpace:'nowrap'}}>${children}</span>`;
}

function Btn({children,onClick,variant='primary',small,danger,style:sx,disabled}) {
  const v = danger ? 'danger' : variant;
  const base = {border:'none',borderRadius:8,cursor:disabled?'not-allowed':'pointer',fontFamily:'inherit',fontWeight:600,transition:'all 0.15s',display:'inline-flex',alignItems:'center',gap:6,opacity:disabled?0.5:1};
  const vs = {
    primary:{background:C.sage,color:'#fff',padding:small?'8px 14px':'10px 20px',fontSize:small?13:14},
    outline:{background:'transparent',color:C.text,border:`1.5px solid ${C.borderMd}`,padding:small?'7px 13px':'9px 19px',fontSize:small?13:14},
    ghost:{background:'transparent',color:C.textMuted,padding:small?'7px 10px':'8px 14px',fontSize:small?13:14},
    danger:{background:C.redLt,color:C.red,padding:small?'7px 13px':'9px 19px',fontSize:small?13:14,border:`1.5px solid ${C.red}22`},
  };
  return html`<button onClick=${disabled?undefined:onClick} style=${{...base,...vs[v],...sx}}>${children}</button>`;
}

  return html`<div onClick=${onClick} style=${{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,padding:'16px 18px',boxShadow:'0 1px 4px rgba(0,0,0,0.04)',cursor:onClick?'pointer':'default',...sx}}>${children}</div>`;

function Inp({label,value,onChange,type='text',placeholder,required,style:sx}) {

function Modal({title,open,onClose,children}) {
  useEffect(()=>{ document.body.style.overflow = open?'hidden':''; return()=>{document.body.style.overflow='';}; },[open]);
  if (!open) return null;
  return html`<div style=${{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:1000,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick=${onClose}>
    <div onClick=${e=>e.stopPropagation()} style=${{background:C.card,borderRadius:'20px 20px 0 0',width:'100%',maxWidth:560,maxHeight:'92vh',overflow:'auto',boxShadow:'0 -8px 40px rgba(0,0,0,0.2)'}}>
      <div style=${{padding:'18px 20px 14px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,background:C.card,zIndex:1}}>
        <h3 style=${{margin:0,fontSize:17,fontWeight:700,color:C.text,fontFamily:"'DM Serif Display',serif"}}>${title}</h3>
        <button onClick=${onClose} style=${{background:'none',border:'none',cursor:'pointer',fontSize:22,color:C.textMuted,padding:'4px 8px'}}>✕</button>
      </div>
      <div style=${{padding:'16px 20px 32px'}}>${children}</div>
    </div>
  </div>`;
}

// ── SYNC ──────────────────────────────────────────────────────────────────────
function SyncPanel({data,onImport,onClose}) {
  const [mode,setMode] = useState('choose');
  const [code,setCode] = useState('');
  const [status,setStatus] = useState('');

  const exportFile = () => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(data)],{type:'application/json'}));
    a.download = `family-life-os-${today()}.json`; a.click();
    setStatus('✓ Downloaded! Send via WhatsApp or iMessage.');
  };
  const copyCode = async () => {
    try { await navigator.clipboard.writeText(btoa(JSON.stringify(data))); setStatus('✓ Copied! Paste in a message.'); }
    catch { setStatus('Use Download option instead.'); }
  };
  const importFile = e => {
    const file = e.target.files[0]; if(!file) return;
    const r = new FileReader();
    r.onload = ev => {
      try { const d=JSON.parse(ev.target.result); if(d.tasks&&d.events){onImport(d);setTimeout(onClose,800);} else setStatus('Invalid file.'); }
      catch { setStatus('Could not read file.'); }
    };
    r.readAsText(file);
  };
  const importCode = () => {
    try { const d=JSON.parse(atob(code.trim())); if(d.tasks&&d.events){onImport(d);setTimeout(onClose,800);} else setStatus('Invalid data.'); }
    catch { setStatus('Could not read — paste the full code.'); }
  };

  return html`<div style=${{display:'flex',flexDirection:'column',gap:12}}>
    ${mode==='choose' && html`<div style=${{display:'flex',flexDirection:'column',gap:10}}>
      <div style=${{background:C.blueLt,borderRadius:10,padding:'10px 14px',fontSize:13,color:C.blue,lineHeight:1.6}}>
        <strong>Family Sync:</strong> One person exports, the other imports. Takes 10 seconds!
      </div>
      <${Btn} onClick=${()=>setMode('export')} style=${{justifyContent:'center',padding:'14px'}}>📤 Share my data<//>
      <${Btn} variant="outline" onClick=${()=>setMode('import')} style=${{justifyContent:'center',padding:'14px'}}>📥 Import from family<//>
    </div>`}
    ${mode==='export' && html`<div style=${{display:'flex',flexDirection:'column',gap:10}}>
      <${Btn} variant="ghost" small onClick=${()=>setMode('choose')}>← Back<//>

// ── CALENDAR ──────────────────────────────────────────────────────────────────
function CalendarSection({data,updateData}) {
  const [view,setView] = useState({month:new Date().getMonth(),year:new Date().getFullYear()});
  const [modal,setModal] = useState(false);
  const [edit,setEdit] = useState(null);
  const [f,setF] = useState({title:'',date:'',type:'event',recurring:false,notes:''});
  const open = item => { setEdit(item); setF(item?{...item}:{title:'',date:'',type:'event',recurring:false,notes:''}); setModal(true); };
  const save = () => {
    if (!f.title||!f.date) return;
    updateData({events: edit ? data.events.map(e=>e.id===edit.id?{...f,id:edit.id,recurring:!!f.recurring}:e) : [...data.events,{...f,id:uid(),recurring:!!f.recurring}]});
    setModal(false);
  };
  const del = id => { updateData({events:data.events.filter(e=>e.id!==id)}); setModal(false); };
  const dim = new Date(view.year,view.month+1,0).getDate();
  const fd = new Date(view.year,view.month,1).getDay();
  const tc = {birthday:C.coral,anniversary:C.purple,appointment:C.blue,event:C.sage};
  const eventsForDay = d => {
    const ds = `${view.year}-${String(view.month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    return data.events.filter(e=>recurringDate(e,view.year)===ds);
  };
  const upcoming = [...data.events].map(e=>({...e,rd:recurringDate(e,view.year)}))
    .filter(e=>daysUntil(e.rd)>=0).sort((a,b)=>daysUntil(a.rd)-daysUntil(b.rd)).slice(0,6);
  return html`<div>
    <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
      <h2 style=${{margin:0,fontSize:22,fontWeight:700,fontFamily:"'DM Serif Display',serif",color:C.text}}>Calendar</h2>
      <${Btn} onClick=${()=>open(null)} small>+ Event<//>
    </div>
    <${Card} style=${{padding:0,marginBottom:14}}>
      <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'13px 16px',borderBottom:`1px solid ${C.border}`}}>
        <${Btn} variant="ghost" small onClick=${()=>setView(v=>({month:v.month===0?11:v.month-1,year:v.month===0?v.year-1:v.year}))}>‹<//>
        <span style=${{fontWeight:700,fontSize:16,color:C.text}}>${MONTHS[view.month]} ${view.year}</span>
        <${Btn} variant="ghost" small onClick=${()=>setView(v=>({month:v.month===11?0:v.month+1,year:v.month===11?v.year+1:v.year}))}>›<//>
      </div>
      <div style=${{display:'grid',gridTemplateColumns:'repeat(7,1fr)'}}>
        ${['S','M','T','W','T','F','S'].map((d,i)=>html`<div key=${i} style=${{textAlign:'center',padding:'8px 2px',fontSize:11,fontWeight:700,color:C.textMuted}}>${d}</div>`)}
      </div>
      <div style=${{display:'grid',gridTemplateColumns:'repeat(7,1fr)'}}>
        ${Array.from({length:fd},(_,i)=>html`<div key=${'e'+i}></div>`)}
        ${Array.from({length:dim},(_,i)=>i+1).map(d=>{
          const evs=eventsForDay(d);
          const isT=today()===`${view.year}-${String(view.month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          return html`<div key=${d} onClick=${()=>evs.length&&open(evs[0])} style=${{minHeight:52,padding:'5px 3px',borderTop:`1px solid ${C.border}`,background:isT?C.sageLt:'transparent',cursor:evs.length?'pointer':'default'}}>
            <div style=${{fontSize:12,fontWeight:isT?700:400,color:isT?C.sage:C.text,textAlign:'center',marginBottom:2}}>${d}</div>
            ${evs.slice(0,2).map(e=>html`<div key=${e.id} style=${{fontSize:10,background:tc[e.type]||C.sage,color:'#fff',borderRadius:3,padding:'1px 3px',marginBottom:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${e.recurring?'↻ ':''}${e.title.split(' ').slice(0,2).join(' ')}</div>`)}
          </div>`;
        })}
      </div>
    <//>
    <div style=${{fontWeight:700,fontSize:12,color:C.textMuted,marginBottom:10,textTransform:'uppercase',letterSpacing:0.5}}>Coming Up</div>
    <div style=${{display:'flex',flexDirection:'column',gap:8}}>
      ${upcoming.map(e=>{ const du=daysUntil(e.rd); return html`<${Card} key=${e.id} style=${{padding:'12px 15px'}}>
        <div style=${{display:'flex',alignItems:'center',gap:12}}>
          <div style=${{width:6,height:6,borderRadius:'50%',background:tc[e.type]||C.sage,flexShrink:0}}></div>
          <div style=${{flex:1}}>
            <div style=${{fontSize:14,fontWeight:600,color:C.text}}>${e.title}${e.recurring&&html`<span style=${{fontSize:11,color:C.purple,marginLeft:6}}>↻</span>`}</div>
            <div style=${{fontSize:12,color:C.textMuted}}>${fmt(e.rd)} · ${du===0?'Today!':du===1?'Tomorrow':`${du} days`}</div>
          </div>
          <${Btn} variant="ghost" small onClick=${()=>open(e)}>✎<//>
          <${Btn} variant="ghost" small onClick=${()=>del(e.id)}>✕<//>
        </div>
      <//>`;} )}
    </div>
    <${Modal} title=${edit?'Edit Event':'New Event'} open=${modal} onClose=${()=>setModal(false)}>
      <div style=${{display:'flex',flexDirection:'column',gap:13}}>
        <${Inp} label="Title" value=${f.title} onChange=${v=>setF({...f,title:v})} required=${true}/>
        <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <${Inp} label="Date" type="date" value=${f.date} onChange=${v=>setF({...f,date:v})} required=${true}/>
          <${Sel} label="Type" value=${f.type} onChange=${v=>setF({...f,type:v})} options=${['event','birthday','anniversary','appointment']}/>
        </div>
        <div style=${{display:'flex',alignItems:'center',gap:10,background:C.purpleLt,borderRadius:8,padding:'10px 12px'}}>
          <input type="checkbox" id="rc" checked=${!!f.recurring} onChange=${e=>setF({...f,recurring:e.target.checked})} style=${{width:16,height:16}}/>
          <label for="rc" style=${{fontSize:14,color:C.text,cursor:'pointer'}}>Repeat every year (birthdays & anniversaries)</label>
        </div>
        <${Inp} label="Notes" value=${f.notes} onChange=${v=>setF({...f,notes:v})}/>
        <div style=${{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <${Btn} variant="outline" onClick=${()=>setModal(false)}>Cancel<//>
          ${edit&&html`<${Btn} danger onClick=${()=>del(edit.id)}>Delete<//>`}
          <${Btn} onClick=${save}>Save<//>
        </div>
      </div>
    <//>
  </div>`;
}

// ── KITCHEN ───────────────────────────────────────────────────────────────────
function Kitchen({data,updateData}) {
  const [tab,setTab] = useState('recipes');
  const [modal,setModal] = useState(false);
  const [edit,setEdit] = useState(null);
  const [view,setView] = useState(null);
  const [f,setF] = useState({name:'',category:'Dinner',servings:4,prepTime:'',cookTime:'',tags:'',ingredients:'',instructions:'',note:'',nutrition:{calories:0,protein:0,carbs:0,fat:0}});
  const [aiLoading,setAiLoading] = useState(false);
  const [mpWeek,setMpWeek] = useState(()=>{ const d=new Date(); d.setDate(d.getDate()-d.getDay()); return d.toISOString().split('T')[0]; });
  const openModal = item => { setEdit(item||null); setF(item?{...item}:{name:'',category:'Dinner',servings:4,prepTime:'',cookTime:'',tags:'',ingredients:'',instructions:'',note:'',nutrition:{calories:0,protein:0,carbs:0,fat:0}}); setModal(true); };
  const save = () => { if(!f.name) return; updateData({recipes:edit?data.recipes.map(r=>r.id===edit.id?{...f,id:edit.id}:r):[...data.recipes,{...f,id:uid()}]}); setModal(false); };
  const del = id => { updateData({recipes:data.recipes.filter(r=>r.id!==id)}); setView(null); };
  const download = () => {
    const txt = data.recipes.map(r=>`${r.name}\n${'='.repeat(r.name.length)}\n\nINGREDIENTS:\n${r.ingredients}\n\nINSTRUCTIONS:\n${r.instructions}\n\n${'─'.repeat(40)}\n`).join('\n');
    const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'})); a.download='My_Recipes.txt'; a.click();
  };
  const calcNutrition = async () => {
    if (!f.ingredients) return; setAiLoading(true);
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,messages:[{role:'user',content:`Estimate nutrition per serving for ${f.servings} servings. Ingredients: ${f.ingredients}. Reply ONLY with JSON: {"calories":N,"protein":N,"carbs":N,"fat":N}`}]})});
      const d=await res.json(); const match=d.content[0].text.match(/\{[\s\S]*\}/);
      if (match) setF(prev=>({...prev,nutrition:JSON.parse(match[0])}));
    } catch(e) {}
    setAiLoading(false);
  };
  const wDays = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'].map((d,i)=>{ const dt=new Date(mpWeek+'T00:00:00'); dt.setDate(dt.getDate()+i); return {day:d,short:d.slice(0,3),date:dt.toISOString().split('T')[0]}; });
  const getMeal = (day,who,slot) => data.mealPlan?.[mpWeek]?.[day]?.[who]?.[slot]||'';
  const setMeal = (day,who,slot,val) => {
    const mp={...data.mealPlan}; if(!mp[mpWeek])mp[mpWeek]={}; if(!mp[mpWeek][day])mp[mpWeek][day]={}; if(!mp[mpWeek][day][who])mp[mpWeek][day][who]={}; mp[mpWeek][day][who][slot]=val; updateData({mealPlan:mp});
  };
  return html`<div>
    <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
      <h2 style=${{margin:0,fontSize:22,fontWeight:700,fontFamily:"'DM Serif Display',serif",color:C.text}}>Kitchen</h2>
      ${tab==='recipes'&&html`<div style=${{display:'flex',gap:6}}><${Btn} variant="outline" small onClick=${download}>⬇<//>  <${Btn} small onClick=${()=>openModal(null)}>+ Recipe<//>  </div>`}
    </div>
    <div style=${{display:'flex',gap:6,marginBottom:16}}>
      ${[['recipes','🍳 Recipes'],['mealplan','📅 Meal Plan']].map(([k,l])=>html`<button key=${k} onClick=${()=>setTab(k)} style=${{border:`1.5px solid ${tab===k?C.sage:C.border}`,background:tab===k?C.sage:'transparent',color:tab===k?'#fff':C.textMuted,borderRadius:8,padding:'8px 16px',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit'}}>${l}</button>`)}
    </div>
    ${tab==='recipes'&&html`<div style=${{display:'flex',flexDirection:'column',gap:10}}>
      ${data.recipes.map(r=>html`<${Card} key=${r.id} onClick=${()=>setView(r)} style=${{cursor:'pointer',padding:'14px 16px'}}>
        <div style=${{fontWeight:700,fontSize:16,color:C.text,marginBottom:6}}>${r.name}</div>
        <div style=${{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
          <${Badge} color="sage" small>${r.category}<//>
          <${Badge} color="blue" small>⏱ ${r.prepTime}+${r.cookTime}<//>
          <${Badge} color="amber" small>👤 ${r.servings}<//>
        </div>
        ${r.nutrition&&html`<div style=${{display:'flex',gap:10,background:C.sageLt,borderRadius:8,padding:'7px 12px'}}>
          ${[['Cal',r.nutrition.calories,''],['Pro',r.nutrition.protein,'g'],['Carb',r.nutrition.carbs,'g'],['Fat',r.nutrition.fat,'g']].map(([l,v,u])=>html`<div key=${l} style=${{textAlign:'center',flex:1}}><div style=${{fontSize:13,fontWeight:700,color:C.sage}}>${v}${u}</div><div style=${{fontSize:10,color:C.textMuted}}>${l}</div></div>`)}
        </div>`}
      <//>` )}
    </div>`}
    ${tab==='mealplan'&&html`<div>
      <div style=${{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
        <span style=${{fontWeight:600,color:C.text,fontSize:14}}>Week of</span>
        <input type="date" value=${mpWeek} onChange=${e=>setMpWeek(e.target.value)} style=${{border:`1.5px solid ${C.border}`,borderRadius:8,padding:'8px 12px',fontSize:14,fontFamily:'inherit'}}/>
      </div>
      ${[['Adults (Me & Husband)','adults',['Breakfast','Lunch','Dinner']],["Adrith 🌟",'baby',['Breakfast','Snack 1','Lunch','Snack 2','Dinner']]].map(([label,who,slots])=>html`<div key=${who} style=${{marginBottom:24}}>
        <div style=${{fontWeight:700,fontSize:15,color:C.text,marginBottom:10,paddingBottom:6,borderBottom:`2px solid ${who==='baby'?C.amber:C.sage}`}}>${label}</div>
        <div style=${{overflowX:'auto'}}>
          <table style=${{width:'100%',minWidth:480,borderCollapse:'collapse'}}>
            <thead><tr>
              <th style=${{padding:'6px 8px',fontSize:11,fontWeight:700,color:C.textMuted,textAlign:'left',minWidth:70}}>Meal</th>
              ${wDays.map(d=>html`<th key=${d.day} style=${{padding:'6px 4px',fontSize:11,fontWeight:700,color:d.date===today()?C.sage:C.textMuted,textAlign:'center',minWidth:58}}>${d.short}</th>`)}
            </tr></thead>
            <tbody>${slots.map(slot=>html`<tr key=${slot}>
              <td style=${{padding:'4px 8px',fontSize:12,fontWeight:600,color:C.textMuted,whiteSpace:'nowrap'}}>${slot}</td>
              ${wDays.map(d=>html`<td key=${d.day} style=${{padding:'3px 4px'}}>
                <input list=${'rl-'+who} value=${getMeal(d.day,who,slot)} onInput=${e=>setMeal(d.day,who,slot,e.target.value)} placeholder="..."
                  style=${{width:'100%',border:`1px solid ${C.border}`,borderRadius:5,padding:'5px 4px',fontSize:11,fontFamily:'inherit',background:C.cream,color:C.text}}/>
              </td>`)}
            </tr>`)}</tbody>
          </table>
          <datalist id=${'rl-'+who}>${data.recipes.map(r=>html`<option key=${r.id} value=${r.name}/>`  )}</datalist>
        </div>
      </div>`)}
    </div>`}
    <${Modal} title=${view?.name||''} open=${!!view} onClose=${()=>setView(null)}>
      ${view&&html`<div>
        <div style=${{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
          <${Badge} color="sage">${view.category}<//>
          <${Badge} color="amber">Serves ${view.servings}<//>
          <${Badge} color="blue">Prep ${view.prepTime}<//>
          <${Badge} color="purple">Cook ${view.cookTime}<//>
        </div>
        ${view.nutrition&&html`<div style=${{display:'flex',gap:10,background:C.sageLt,borderRadius:10,padding:'10px 14px',marginBottom:14}}>
          ${[['Calories',view.nutrition.calories,''],['Protein',view.nutrition.protein,'g'],['Carbs',view.nutrition.carbs,'g'],['Fat',view.nutrition.fat,'g']].map(([l,v,u])=>html`<div key=${l} style=${{textAlign:'center',flex:1}}><div style=${{fontSize:18,fontWeight:700,color:C.sage}}>${v}${u}</div><div style=${{fontSize:11,color:C.textMuted}}>${l}</div></div>`)}
        </div>`}
        <div style=${{marginBottom:12}}><div style=${{fontWeight:700,fontSize:13,marginBottom:6,color:C.text}}>Ingredients</div><div style=${{fontSize:14,color:C.text,lineHeight:1.7,whiteSpace:'pre-wrap',background:C.cream,borderRadius:8,padding:'10px 12px'}}>${view.ingredients}</div></div>
        <div style=${{marginBottom:12}}><div style=${{fontWeight:700,fontSize:13,marginBottom:6,color:C.text}}>Instructions</div><div style=${{fontSize:14,color:C.text,lineHeight:1.7,whiteSpace:'pre-wrap',background:C.cream,borderRadius:8,padding:'10px 12px'}}>${view.instructions}</div></div>
        ${view.note&&html`<div style=${{fontSize:13,color:C.textMuted,fontStyle:'italic',background:C.amberLt,borderRadius:8,padding:'10px 12px',marginBottom:12}}>💡 ${view.note}</div>`}
        <div style=${{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <${Btn} danger small onClick=${()=>del(view.id)}>Delete<//>
          <${Btn} variant="outline" small onClick=${()=>{openModal(view);setView(null);}}>Edit<//>
        </div>
      </div>`}
    <//>
    <${Modal} title=${edit?'Edit Recipe':'New Recipe'} open=${modal} onClose=${()=>setModal(false)}>
      <div style=${{display:'flex',flexDirection:'column',gap:13}}>
        <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <${Inp} label="Recipe Name" value=${f.name} onChange=${v=>setF({...f,name:v})} required=${true}/>
          <${Inp} label="Category" value=${f.category} onChange=${v=>setF({...f,category:v})} placeholder="Indian, Breakfast..."/>
        </div>
        <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
          <${Inp} label="Servings" type="number" value=${f.servings} onChange=${v=>setF({...f,servings:+v})}/>
          <${Inp} label="Prep Time" value=${f.prepTime} onChange=${v=>setF({...f,prepTime:v})} placeholder="10 min"/>
          <${Inp} label="Cook Time" value=${f.cookTime} onChange=${v=>setF({...f,cookTime:v})} placeholder="30 min"/>
        </div>
        <${Inp} label="Tags" value=${f.tags} onChange=${v=>setF({...f,tags:v})} placeholder="vegetarian, quick..."/>
        <${Txa} label="Ingredients" value=${f.ingredients} onChange=${v=>setF({...f,ingredients:v})} rows=${4} placeholder="One per line..."/>
        <${Txa} label="Instructions" value=${f.instructions} onChange=${v=>setF({...f,instructions:v})} rows=${4} placeholder="Step by step..."/>
        <${Inp} label="Note" value=${f.note} onChange=${v=>setF({...f,note:v})} placeholder="Tips..."/>
        <div>
          <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <label style=${{fontSize:13,fontWeight:600,color:C.textMuted}}>Nutrition per serving</label>
            <${Btn} variant="outline" small onClick=${calcNutrition}>${aiLoading?'⏳...':'✦ AI Calc'}<//>
          </div>
          <div style=${{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
            ${['calories','protein','carbs','fat'].map(k=>html`<${Inp} key=${k} label=${k[0].toUpperCase()+k.slice(1)} type="number" value=${f.nutrition?.[k]||''} onChange=${v=>setF({...f,nutrition:{...f.nutrition,[k]:+v}})}/>` )}

function HomeCare({data,updateData}) {

  const saveM = () => { if(!f.task) return; updateData({maintenance:edit?data.maintenance.map(m=>m.id===edit.id?{...f,id:edit.id}:m):[...data.maintenance,{...f,id:uid()}]}); setModal(false); };
  const delM = id => updateData({maintenance:data.maintenance.filter(m=>m.id!==id)});
  const toggleC = (freq,id) => updateData({cleaning:{...data.cleaning,[freq]:data.cleaning[freq].map(t=>t.id===id?{...t,done:!t.done}:t)}});
  const resetC = freq => updateData({cleaning:{...data.cleaning,[freq]:data.cleaning[freq].map(t=>({...t,done:false}))}});
  const addC = freq => { const task=prompt('New task:'); if(task) updateData({cleaning:{...data.cleaning,[freq]:[...data.cleaning[freq],{id:uid(),task,done:false,assigned:'Me'}]}}); };
  const sc = d => { const du=daysUntil(d); return du<0?'red':du<=3?'coral':du<=14?'amber':'sage'; };

    </div>
    <div style=${{display:'flex',gap:6,marginBottom:16}}>
      ${[['maintenance','🔧 Maintenance'],['cleaning','🧹 Cleaning']].map(([k,l])=>html`<button key=${k} onClick=${()=>setTab(k)} style=${{border:`1.5px solid ${tab===k?C.sage:C.border}`,background:tab===k?C.sage:'transparent',color:tab===k?'#fff':C.textMuted,borderRadius:8,padding:'8px 16px',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit'}}>${l}</button>`)}
    </div>
    ${tab==='maintenance'&&html`<div style=${{display:'flex',flexDirection:'column',gap:8}}>
      ${[...data.maintenance].sort((a,b)=>daysUntil(a.nextDue)-daysUntil(b.nextDue)).map(m=>html`<${Card} key=${m.id} style=${{padding:'13px 15px'}}>
        <div style=${{display:'flex',alignItems:'flex-start',gap:10}}>
          <div style=${{flex:1}}>
            <div style=${{fontWeight:600,fontSize:15,color:C.text,marginBottom:3}}>${m.task}</div>
            <div style=${{fontSize:12,color:C.textMuted,display:'flex',gap:10,flexWrap:'wrap'}}>
              <span>🔄 ${m.frequency}</span>
              ${m.lastDone&&html`<span>✓ ${fmt(m.lastDone)}</span>`}
              ${m.nextDue&&html`<span>📅 ${fmt(m.nextDue)}</span>`}
            </div>

          </div>
          <div style=${{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
            ${m.nextDue&&html`<${Badge} color=${sc(m.nextDue)} small>${daysUntil(m.nextDue)<0?'Overdue':daysUntil(m.nextDue)===0?'Today':`${daysUntil(m.nextDue)}d`}<//>` }
            <${Btn} variant="ghost" small onClick=${()=>openM(m)}>✎<//>
            <${Btn} variant="ghost" small onClick=${()=>delM(m.id)}>✕<//>
          </div>
        </div>
      <//>` )}
    </div>`}

// ── RECORDS ───────────────────────────────────────────────────────────────────
function Records({data,updateData}) {
  const [modal,setModal] = useState(false);
  const [edit,setEdit] = useState(null);
  const [f,setF] = useState({});
  const [reveal,setReveal] = useState({});
  const open = item => { setEdit(item||null); setF(item?{...item}:{category:'Insurance',label:'',value:'',note:''}); setModal(true); };
  const save = () => { if(!f.label||!f.value) return; updateData({records:edit?data.records.map(r=>r.id===edit.id?{...f,id:edit.id}:r):[...data.records,{...f,id:uid()}]}); setModal(false); };
  const del = id => { updateData({records:data.records.filter(r=>r.id!==id)}); setModal(false); };
  const cats = [...new Set(data.records.map(r=>r.category))].sort();
  return html`<div>
    <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
      <h2 style=${{margin:0,fontSize:22,fontWeight:700,fontFamily:"'DM Serif Display',serif",color:C.text}}>Personal Records</h2>
      <${Btn} small onClick=${()=>open(null)}>+ Add<//>
    </div>
    <div style=${{background:C.amberLt,borderRadius:10,padding:'10px 14px',fontSize:13,color:C.amber,marginBottom:16}}>🔒 Values hidden — tap 👁 to reveal</div>
    ${cats.map(cat=>html`<div key=${cat} style=${{marginBottom:20}}>
      <div style=${{fontWeight:700,fontSize:12,color:C.textMuted,textTransform:'uppercase',letterSpacing:0.8,marginBottom:8}}>${cat}</div>
      <${Card} style=${{padding:'4px 0'}}>
        ${data.records.filter(r=>r.category===cat).map(r=>html`<div key=${r.id} style=${{display:'flex',alignItems:'center',gap:12,padding:'13px 16px',borderBottom:`1px solid ${C.border}`}}>
          <div style=${{flex:1,minWidth:0}}>
            <div style=${{fontSize:12,fontWeight:600,color:C.textMuted}}>${r.label}</div>
            <div style=${{fontSize:15,fontWeight:600,color:C.text}}>${reveal[r.id]?r.value:'••••••••'}</div>
            ${r.note&&html`<div style=${{fontSize:12,color:C.textMuted}}>${r.note}</div>`}
          </div>
          <div style=${{display:'flex',gap:6}}>
            <${Btn} variant="ghost" small onClick=${()=>setReveal(rv=>({...rv,[r.id]:!rv[r.id]}))}>${reveal[r.id]?'🙈':'👁'}<//>
            <${Btn} variant="ghost" small onClick=${()=>open(r)}>✎<//>
            <${Btn} variant="ghost" small onClick=${()=>del(r.id)}>✕<//>
          </div>

// ── DATA MANAGEMENT (BULK IMPORT/EXPORT) ──────────────────────────────────────
function DataManagement({data, updateData}) {
  const [tab, setTab] = useState('import');
  const [csvData, setCsvData] = useState([]);
  const [section, setSection] = useState('calendar');
  const [mapping, setMapping] = useState({});
  const [preview, setPreview] = useState([]);
  const [step, setStep] = useState(0);
  const [status, setStatus] = useState('');
  const [selectedFile, setSelectedFile] = useState(null);
  const fileInputRef = useRef(null);
  
  const sections = {
    calendar:{label:'Calendar Events',req:['title','date'],fields:['title','date','type','notes']},
    kitchen:{label:'Recipes',req:['name'],fields:['name','ingredients','instructions','servings','prepTime','cookTime','category','tags','nutrition','note']},
    groceries:{label:'Groceries Master',req:['name'],fields:['name','category','tags','note']},
    tasks:{label:'Tasks',req:['title'],fields:['title','priority','owner','status','dueDate','tags','note']},
    homecare:{label:'Maintenance',req:['task'],fields:['task','frequency','lastDone','nextDue','notes']},
  };
  
  const handleFileSelect = e => {
    const f = e.target.files[0];
    if (f) {
      setSelectedFile(f);
      setStatus('');
    }
  };
  
  const handleProcessCSV = () => {
    if (!selectedFile) {
      setStatus('❌ Please select a file first');
      return;
    }
    
    setStatus('⏳ Processing CSV...');
    Papa.parse(selectedFile, {
      header:true, skipEmptyLines:true,
      complete:r => {
        if (r.data && r.data.length > 0) {
          setCsvData(r.data);
          setStatus('');
          const h = Object.keys(r.data[0]);
          const m = {};
          h.forEach(k=>m[k]=k.toLowerCase().replace(/\s+/,''));
          setMapping(m);
          setPreview(r.data.slice(0,3).map(row=>{const o={}; Object.keys(m).forEach(k=>{if(m[k]) o[m[k]]=row[k];});return o;}));
          setStep(1);
        } else {
          setStatus('❌ CSV file is empty or invalid');
        }
      },
      error:e=>{
        setStatus(`❌ Error: ${e.message}`);
      }
    });
  };
  
  const handleMapping = (csv, app) => {
    const m = {...mapping}; m[csv] = app; setMapping(m);
    setPreview(csvData.slice(0,3).map(row=>{const o={}; Object.keys(m).forEach(k=>{if(m[k]) o[m[k]]=row[k];});return o;}));
  };
  
  const handleImport = () => {
    const cfg = sections[section];
    const missing = cfg.req.filter(f=>!Object.values(mapping).includes(f));
    if (missing.length > 0) { setStatus(`❌ Missing required: ${missing.join(', ')}`); return; }
    
    const transformed = csvData.map((row,idx)=>{
      const item = {id:uid()};
      Object.keys(mapping).forEach(csv=>{
        const app = mapping[csv];
        if (app && row[csv]) item[app] = row[csv];
      });
      return item;
    });
    
    let updates = {};
    if (section === 'calendar') updates.events = [...(data.events||[]),...transformed];
    else if (section === 'kitchen') updates.recipes = [...(data.recipes||[]),...transformed];
    else if (section === 'groceries') updates.groceries = {...data.groceries, master:[...(data.groceries?.master||[]),...transformed]};
    else if (section === 'tasks') updates.tasks = [...(data.tasks||[]),...transformed];
    else if (section === 'homecare') updates.maintenance = [...(data.maintenance||[]),...transformed];
    
    updateData(updates);
    setStatus(`✅ Imported ${transformed.length} items!`);
    setTimeout(()=>{ setCsvData([]); setMapping({}); setPreview([]); setStep(0); setSelectedFile(null); if(fileInputRef.current) fileInputRef.current.value=''; }, 1500);
  };
  
  const handleExport = () => {
    let rows = [], headers = [];
    if (section === 'calendar') { rows = data.events||[]; headers = ['title','date','type','notes']; }
    else if (section === 'kitchen') { rows = data.recipes||[]; headers = ['name','ingredients','instructions','servings','prepTime','cookTime','category','tags','note']; }
    else if (section === 'groceries') { rows = data.groceries?.master||[]; headers = ['name','category','tags','note']; }
    else if (section === 'tasks') { rows = data.tasks||[]; headers = ['title','priority','owner','status','dueDate','tags','note']; }
    else if (section === 'homecare') { rows = data.maintenance||[]; headers = ['task','frequency','lastDone','nextDue','notes']; }
    
    const csv = [headers.join(','), ...rows.map(r=>headers.map(h=>{let v=r[h]||''; if(typeof v==='string' && v.includes(',')) v=`"${v}"`; return v;}).join(','))].join('\n');
    const blob = new Blob([csv],{type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${section}_${today()}.csv`; a.click();
  };
  
  const cfg = sections[section];
  return html`<div>
    <h2 style=${{fontSize:22,fontWeight:700,marginBottom:20,color:C.text,fontFamily:"'DM Serif Display',serif"}}>📊 Data Management</h2>
    <div style=${{display:'flex',gap:0,marginBottom:20,borderBottom:`2px solid ${C.border}`}}>
      <button onClick=${()=>{setTab('import');setStep(0);}} style=${{flex:1,padding:'12px 16px',background:tab==='import'?C.sageLt:'transparent',color:tab==='import'?C.sage:C.textMuted,border:'none',cursor:'pointer',fontWeight:700,fontSize:14,borderRadius:'8px 8px 0 0'}}>📥 Import</button>
      <button onClick=${()=>setTab('export')} style=${{flex:1,padding:'12px 16px',background:tab==='export'?C.sageLt:'transparent',color:tab==='export'?C.sage:C.textMuted,border:'none',cursor:'pointer',fontWeight:700,fontSize:14,borderRadius:'8px 8px 0 0'}}>📤 Export</button>
    </div>
    
    ${tab === 'import' ? html`
      <div style=${{display:'flex',flexDirection:'column',gap:16}}>
        <${Sel} label="Select section:" value=${section} onChange=${v=>{setSection(v);setStep(0);}} options=${Object.entries(sections).map(([k,c])=>({value:k,label:c.label}))}/>
        ${step === 0 ? html`
          <div style=${{border:`2px dashed ${C.coral}`,borderRadius:12,padding:'40px 20px',textAlign:'center',background:C.coralLt}}>
            <p style=${{fontSize:14,fontWeight:700,color:C.text,marginBottom:8}}>📁 Upload CSV File</p>
            <p style=${{fontSize:12,color:C.textMuted,marginBottom:16}}>Export from Google Sheets as .csv</p>
            <input ref=${fileInputRef} type="file" accept=".csv" onChange=${handleFileSelect} style=${{padding:'8px',marginBottom:'12px'}}/>
            ${selectedFile && html`
              <div style=${{marginBottom:16}}>
                <p style=${{fontSize:12,color:C.sage,fontWeight:600,marginBottom:8}}>✅ Selected: ${selectedFile.name}</p>
                <${Btn} onClick=${handleProcessCSV}>Process CSV<//>
              </div>
            `}
            ${status && html`<p style=${{fontSize:11,color:status.includes('✅')?C.green:status.includes('⏳')?C.text:C.red,marginTop:8}}>${status}</p>`}
            <p style=${{fontSize:11,color:C.textMuted,marginTop:16}}>Required: ${cfg.req.join(', ')}</p>
          </div>
        ` : html`
          <div>
            <h3 style=${{fontSize:14,fontWeight:700,marginBottom:12,color:C.text}}>Step 1: Map Columns</h3>
            <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(180px, 1fr))',gap:12,marginBottom:20}}>
              ${Object.keys(csvData[0]||{}).map(k=>html`<div key=${k} style=${{padding:12,border:`1px solid ${C.border}`,borderRadius:8,background:C.cream}}>
                <label style=${{display:'block',fontSize:11,fontWeight:700,color:C.textMuted,marginBottom:4}}>CSV: "${k}"</label>
                <select value=${mapping[k]||''} onChange=${e=>handleMapping(k,e.target.value)} style=${{width:'100%',padding:'8px',fontSize:12,border:`1px solid ${C.border}`,borderRadius:6}}>
                  <option>-- Skip --</option>
                  ${cfg.fields.map(f=>html`<option key=${f} value=${f}>${f}</option>`)}
                </select>
              </div>`)}
            </div>
            
            <h3 style=${{fontSize:14,fontWeight:700,marginBottom:12,color:C.text}}>Step 2: Preview</h3>
            <div style=${{overflowX:'auto',marginBottom:16,border:`1px solid ${C.border}`,borderRadius:8}}>
              <table style=${{width:'100%',fontSize:11,borderCollapse:'collapse'}}>
                <thead><tr style=${{background:C.sage,color:'white'}}>
                  ${cfg.fields.map(f=>html`<th key=${f} style=${{padding:'10px',textAlign:'left',borderRight:`1px solid ${C.border}`}}>${f}</th>`)}
                </tr></thead>
                <tbody>
                  ${preview.map((r,i)=>html`<tr key=${i} style=${{background:i%2===0?C.cream:C.card,borderBottom:`1px solid ${C.border}`}}>
                    ${cfg.fields.map(f=>html`<td key=${f} style=${{padding:'10px',borderRight:`1px solid ${C.border}`,maxWidth:'120px',overflow:'hidden',textOverflow:'ellipsis'}}>${r[f]||'—'}</td>`)}
                  </tr>`)}
                </tbody>
              </table>
            </div>
            
            <p style=${{fontSize:11,color:C.textMuted,marginBottom:16}}>📋 Showing 3 of ${csvData.length} rows</p>
            ${status && html`<div style=${{padding:12,marginBottom:16,background:status.includes('✅')?C.greenLt:C.redLt,color:status.includes('✅')?C.green:C.red,borderRadius:6,fontSize:12}}>${status}</div>`}
            
            <div style=${{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <${Btn} variant="outline" onClick=${()=>{setStep(0);setCsvData([]);}}>Cancel<//>
              <${Btn} onClick=${handleImport}>✅ Import ${csvData.length} Items<//>
            </div>
          </div>
        `}
      </div>
    ` : html`
      <div>
        <h3 style=${{fontSize:14,fontWeight:700,marginBottom:12,color:C.text}}>Export ${cfg.label}</h3>
        <p style=${{fontSize:13,color:C.textMuted,marginBottom:16}}>Download as CSV for backup or editing in Google Sheets</p>
        <div style=${{padding:20,background:C.amberLt,borderRadius:8,marginBottom:16}}>
          <p style=${{fontWeight:700,marginBottom:8,color:C.text}}>📦 Ready to export</p>
          <p style=${{fontSize:12,color:C.textMuted,marginBottom:12}}>${section==='calendar'?data.events?.length:section==='kitchen'?data.recipes?.length:section==='groceries'?data.groceries?.master?.length:section==='tasks'?data.tasks?.length:data.maintenance?.length||0} items</p>
          <${Btn} onClick=${handleExport}>⬇️ Download CSV<//>
        </div>
      </div>
    `}
  </div>`;
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
const NAV = [
  {id:'dashboard',label:'Home',emoji:'🏠'},
  {id:'tasks',label:'Tasks',emoji:'✅'},
  {id:'calendar',label:'Calendar',emoji:'📅'},
  {id:'groceries',label:'Groceries',emoji:'🛒'},
  {id:'kitchen',label:'Kitchen',emoji:'🍳'},
  {id:'homecare',label:'Home Care',emoji:'🏡'},
  {id:'trips',label:'Trips',emoji:'✈️'},
  {id:'parties',label:'Parties',emoji:'🎉'},
  {id:'baby',label:'Adrith',emoji:'👶'},
  {id:'records',label:'Records',emoji:'📁'},
  {id:'dataManagement',label:'Data',emoji:'📊'},
];

function App() {
  const [section, setSection] = useState('dashboard');
  const [data, setData] = useState(null);
  const [syncModal, setSyncModal] = useState(false);
  const [navOpen, setNavOpen] = useState(false);
  const mobile = window.innerWidth < 768;

  useEffect(() => {
    try { 
      const s=localStorage.getItem(STORAGE_KEY); 
      setData(s?JSON.parse(s)||SEED:SEED); 
    } catch { 
      setData(SEED); 
    }
    
    // Listen for Firebase real-time updates
    if (database) {
      const unsubscribe = database.ref('familyData').on('value', snapshot => {
        const fbData = snapshot.val();
        if (fbData) {
          console.log('🔄 Real-time update from Firebase');
          setData(fbData);
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(fbData)); } catch(e) {}
        }
      }, error => {
        console.warn('Firebase listen error:', error.message);
      });
      return () => {
        if (database) database.ref('familyData').off('value');
      };
    }
    
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  }, []);

  const updateData = useCallback(updates => {
    setData(prev => {
      const next = {...prev,...updates};
      try { localStorage.setItem(STORAGE_KEY,JSON.stringify(next)); } catch(e) {}
      // Sync to Firebase in real-time
      if (database) {
        try {
          database.ref('familyData').set(next).catch(e=>console.warn('Firebase sync error:',e.message));
        } catch (e) {
          console.warn('Firebase write failed:', e.message);
        }
      }
      return next;
    });
  }, []);

  const navigate = useCallback(id => { setSection(id); setNavOpen(false); }, []);

  if (!data) return html`<div style=${{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',fontSize:18,color:C.sage}}>Loading ✦</div>`;

  const SECTIONS = {
    dashboard: html`<${Dashboard} data=${data} navigate=${navigate}/>`,
    tasks: html`<${Tasks} data=${data} updateData=${updateData}/>`,
    calendar: html`<${CalendarSection} data=${data} updateData=${updateData}/>`,
    groceries: html`<${Groceries} data=${data} updateData=${updateData}/>`,
    kitchen: html`<${Kitchen} data=${data} updateData=${updateData}/>`,
    homecare: html`<${HomeCare} data=${data} updateData=${updateData}/>`,
    trips: html`<${Trips} data=${data} updateData=${updateData}/>`,
    parties: html`<${Parties} data=${data} updateData=${updateData}/>`,
    baby: html`<${BabyCorner} data=${data} updateData=${updateData}/>`,
    records: html`<${Records} data=${data} updateData=${updateData}/>`,
    dataManagement: html`<${DataManagement} data=${data} updateData=${updateData}/>`,
  };

  const cur = NAV.find(n=>n.id===section);

  return html`<div style=${{display:'flex',height:'100vh',background:C.cream,overflow:'hidden',flexDirection:mobile?'column':'row'}}>
    ${navOpen&&mobile&&html`<div onClick=${()=>setNavOpen(false)} style=${{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:40}}></div>`}

    <div style=${{
      display:mobile&&!navOpen?'none':'flex',
      position:mobile?'fixed':'relative',
      left:0,top:0,bottom:0,zIndex:50,width:mobile?'100%':240,height:mobile?'auto':'100%',flexDirection:mobile?'row':'column',
      flexShrink:0,background:C.card,
      borderRight:mobile?'none':`1px solid ${C.border}`,
      borderTop:mobile?`1px solid ${C.border}`:'none',
      transition:mobile?'none':'left 0.25s ease',
    }}>
      <div style=${{padding:mobile?'12px 16px':'18px 16px 14px',borderBottom:mobile?'none':`1px solid ${C.border}`,borderRight:mobile?`1px solid ${C.border}`:'none',display:'flex',alignItems:'center',gap:10,flexShrink:0,width:mobile?'auto':'100%'}}>
        <div style=${{width:34,height:34,borderRadius:10,background:C.sage,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <span style=${{color:'#fff',fontSize:16}}>✦</span>
        </div>
        ${!mobile&&html`<div>
          <div style=${{fontWeight:700,fontSize:14,color:C.text,fontFamily:"'DM Serif Display',serif",lineHeight:1.2}}>Family Life OS</div>
          <div style=${{fontSize:11,color:C.textMuted}}>Our Home · Adrith · Life</div>
        </div>`}
        ${mobile&&html`<button onClick=${()=>setNavOpen(false)} style=${{marginLeft:'auto',background:'none',border:'none',cursor:'pointer',fontSize:20,color:C.text}}>✕</button>`}
      </div>
      <nav style=${{flex:mobile?'0 0 auto':'1',padding:mobile?'0':'10px',overflowY:mobile?'hidden':'auto',overflowX:mobile?'auto':'hidden',display:'flex',flexDirection:mobile?'row':'column',width:mobile?'100%':'auto',maxHeight:mobile?'60px':'100%',position:mobile?'fixed':'relative',bottom:mobile?0:'auto',left:mobile?0:'auto',right:mobile?0:'auto',zIndex:mobile?100:'auto',background:mobile?C.card:'transparent',borderTop:mobile?`1px solid ${C.border}`:'none',boxShadow:mobile?'0 -2px 8px rgba(0,0,0,0.06)':'none',paddingBottom:mobile?'max(4px, env(safe-area-inset-bottom))':'0',height:mobile?'58px':'auto'}}>
        ${NAV.map(n=>html`<button key=${n.id} onClick=${()=>navigate(n.id)} style=${{
          display:'flex',alignItems:mobile?'center':'flex-start',gap:mobile?2:10,width:mobile?'auto':'100%',padding:mobile?'4px 8px':'10px 12px',
          borderRadius:8,border:'none',cursor:'pointer',fontFamily:'inherit',
          fontWeight:section===n.id?700:500,fontSize:mobile?10:14,marginBottom:mobile?0:2,textAlign:'left',
          background:section===n.id?C.sageLt:'transparent',color:section===n.id?C.sage:C.textMuted,
          flexDirection:mobile?'column':'row',whiteSpace:mobile?'nowrap':'normal',flex:mobile?1:0,justifyContent:mobile?'center':'flex-start',minHeight:mobile?50:'auto',
        }}><span style=${{fontSize:mobile?18:18}}>${n.emoji}</span> <span style=${{fontSize:mobile?9:14}}>${n.label}</span></button>`)}
      </nav>
      ${!mobile&&html`<div style=${{padding:'10px',borderTop:`1px solid ${C.border}`,marginTop:'auto'}}>
        <button onClick=${()=>setSyncModal(true)} style=${{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'10px 12px',borderRadius:10,border:`1.5px solid ${C.border}`,cursor:'pointer',fontFamily:'inherit',fontWeight:600,fontSize:13,background:C.sageLt,color:C.sage}}>🔄 Family Sync</button>
      </div>`}
    </div>

    <div style=${{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0,width:mobile?'100%':'auto'}}>
      ${mobile&&html`<div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 12px',borderBottom:`1px solid ${C.border}`,background:C.card,flexShrink:0,minHeight:40,maxHeight:40}}>
        <button onClick=${()=>setNavOpen(true)} style=${{background:'none',border:'none',cursor:'pointer',fontSize:20,color:C.text,padding:'2px 4px',minWidth:40,minHeight:40,display:'flex',alignItems:'center'}}>☰</button>
        <span style=${{fontWeight:600,fontSize:12,color:C.text,fontFamily:"'DM Serif Display',serif",flex:1,textAlign:'center'}}>${cur?.emoji} ${cur?.label}</span>
        <button onClick=${()=>setSyncModal(true)} style=${{background:'none',border:'none',cursor:'pointer',fontSize:16,color:C.sage,padding:'2px 4px',minWidth:40,minHeight:40,display:'flex',alignItems:'center'}}>🔄</button>
      </div>`}

      <div style=${{flex:1,overflow:'auto',padding:mobile?'10px 12px':'20px 18px',maxWidth:860,width:'100%',margin:'0 auto',paddingBottom:mobile?'70px':'20px'}}>
        ${SECTIONS[section]}
      </div>
    </div>

    <${Modal} title="🔄 Family Sync" open=${syncModal} onClose=${()=>setSyncModal(false)}>
      <${SyncPanel} data=${data} onImport=${d=>updateData(d)} onClose=${()=>setSyncModal(false)}/>
    <//>
  </div>`;
}

ReactDOM.createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>
